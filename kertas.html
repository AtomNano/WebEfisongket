<!DOCTYPE html>
<html lang="en">

<body class="d-flex align-items-center py-4 bg-body-tertiary">
<main class="form-signin w-100 m-auto">
  <form action="" method="post">
    <h1 class="h3 mb-3 fw-normal">Please sign in</h1>
    <div class="form-floating mb-3">
      <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" name="email" required>
      <label for="floatingInput">Email address</label>
    </div>
    <div class="form-floating mb-3">
      <input type="password" class="form-control" id="floatingPassword" placeholder="Password" name="password" required>
      <label for="floatingPassword">Password</label>
    </div>
    <button class="btn btn-custom w-100 py-2" name="submit" type="submit">Sign in</button>
    <a class="btn btn-custom w-100 py-2 mt-2" href="index.php?p=home" role="button">Back</a>

  </form>
</main>

<div class="custom-card p-4 d-flex flex-column flex-md-row align-items-center">
    <!-- Text Section -->
    <div class="text-section mr-md-4 mb-4 mb-md-0">
        <p class="text-muted mb-1">Efi Songket Exclusive</p>
        <h2 class="font-weight-bold mb-2">Songket Balapak Banyak Motif</h2>
        <p class="text-muted">Kain songket asli dengan motif tradisional dan kualitas benang terbaik. Cocok untuk acara formal atau koleksi pribadi.</p>
        <button class="btn btn-custom">Lihat Detail</button>
        <!-- Dots -->
        <div class="dots mt-3">
            <div class="dot active"></div>
            <div class="dot"></div>
        </div>
    </div>
    <!-- Image Section -->
    <div class="image-placeholder flex-grow-1"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Apply the 'loaded' class to trigger the animation when the page is fully loaded
    window.addEventListener('load', function() {
        const card = document.querySelector('.custom-card');
        card.classList.add('loaded');
    });
</script>
</body>
</html>
